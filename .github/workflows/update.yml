name: Update lists

on:
  schedule:
    - cron: '0 */3 * * *'     # каждые 3 часа (UTC)
  workflow_dispatch:          # ручной запуск кнопкой

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download lists
        run: |
          cd "$GITHUB_WORKSPACE"
          wget -qO meta_cidr4.lst \
            "https://iplist.opencck.org/?format=text&data=cidr4&site=messenger.com&site=whatsapp.com&site=facebook.com&site=instagram.com"
          wget -qO meta_domains.lst \
            "https://iplist.opencck.org/?format=text&data=domains&wildcard=1&site=messenger.com&site=whatsapp.com&site=facebook.com&site=instagram.com"

      - name: Commit if changed
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add meta_cidr4.lst meta_domains.lst

          if ! git diff --cached --quiet; then
            git commit -m "Update lists $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes"
          fi
